# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - nova-kibana-mcp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Keep production dependencies only
        run: npm prune --omit=dev

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r dist deploy/dist
          cp package.json deploy/
          if [ -f package-lock.json ]; then
            cp package-lock.json deploy/
          fi
          cp -r node_modules deploy/node_modules

      - name: Verify deploy package
        run: |
          test -f deploy/dist/server.js
          test -d deploy/node_modules/express
          ls -la deploy
          ls -la deploy/node_modules | head -n 20
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nova-kibana-mcp'
          slot-name: 'Production'
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_123A5103B1104E879DF85B23C622CFEF }}